version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: networking_platform_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: local_password
      POSTGRES_DB: networking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Optional but helpful: A web-based UI to view your database
  pgadmin:
    image: dpage/pgadmin4
    container_name: networking_platform_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: